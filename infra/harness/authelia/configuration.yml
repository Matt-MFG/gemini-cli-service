# Authelia Configuration — Gemini CLI as a Service Harness
# Provides SSO/OIDC for all harness apps.

server:
  address: 'tcp://0.0.0.0:9091/'

log:
  level: info

authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: argon2id

session:
  cookies:
    - domain: '${HARNESS_DOMAIN:-localhost}'
      authelia_url: 'https://auth.${HARNESS_DOMAIN:-localhost}'

storage:
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt

access_control:
  default_policy: one_factor
  rules:
    - domain: '*.${HARNESS_DOMAIN:-localhost}'
      policy: one_factor

identity_providers:
  oidc:
    hmac_secret: '${HARNESS_OIDC_HMAC_SECRET:-a-very-long-hmac-secret-for-oidc-provider}'
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        use: 'sig'
        key: |
          ${HARNESS_OIDC_PRIVATE_KEY:-}
    clients: []
    # Clients are dynamically added by the installer via sso-client.js
    # Each installed app gets an OIDC client entry here
